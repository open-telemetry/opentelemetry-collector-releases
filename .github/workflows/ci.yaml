name: CI - Collector Binaries

on:
  merge_group:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
      - release/*

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        distro:
          - otelcol
          - otelcol-contrib
          - otelcol-k8s
          - otelcol-otlp
          - otelcol-ebpf-profiler
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "~1.26.0"
          check-latest: true

      - name: Tidy go.mod files
        run: go mod tidy

      - name: Verify
        run: make ci
        env:
          DISTRIBUTIONS: ${{ matrix.distro }}

  build-result:
    name: "Build Result"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Build for all distros succeeded"
