name: CI - Collector Binaries

on:
  merge_group:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
      - release/*

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        distro:
          - otelcol
          - otelcol-contrib
          - otelcol-k8s
          - otelcol-otlp
          - otelcol-ebpf-profiler
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "~1.26.0"
          check-latest: true

      - name: Tidy go.mod files
        run: go mod tidy

      - name: Verify
        run: make ci
        env:
          DISTRIBUTIONS: ${{ matrix.distro }}

  build-result:
    name: "Build Result"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Build for all distros succeeded"
