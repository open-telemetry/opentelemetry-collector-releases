name: CI - Collector Binaries

on:
  merge_group:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
      - release/*

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        distro:
          - otelcol
          - otelcol-contrib
          - otelcol-k8s
          - otelcol-otlp
          - otelcol-ebpf-profiler
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "~1.26.0"
          check-latest: true

      - name: Tidy go.mod files
        run: go mod tidy

      - name: Verify
        run: make ci
        env:
          DISTRIBUTIONS: ${{ matrix.distro }}

  build-result:
    name: "Build Result"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Build for all distros succeeded"
