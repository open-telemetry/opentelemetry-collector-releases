receivers:
  # Collect own metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 2s
          static_configs:
            - targets: ['0.0.0.0:8888']
          metric_relabel_configs:
            - source_labels: [service_name]
              target_label: service.name
            - source_labels: [service_instance_id]
              target_label: service.instance.id
            - source_labels: [service_version]
              target_label: service.version
            - regex: service_name|service_instance_id|service_version
              action: labeldrop
exporters:
  debug:
    verbosity: detailed
  otlp_grpc:
    endpoint: http://golden:4317
    tls:
      insecure: true
    retry_on_failure:
      enabled: false
    sending_queue:
      enabled: false
service:
  pipelines:
    metrics:
      receivers:
        - prometheus
      exporters:
        - otlp_grpc
